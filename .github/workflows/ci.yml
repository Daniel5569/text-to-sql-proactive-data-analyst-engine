name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  node-gateway:
    name: Node gateway
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: analyst_engine
          POSTGRES_USER: analyst
          POSTGRES_PASSWORD: change-me-in-production
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U analyst -d analyst_engine"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: analyst_engine
      POSTGRES_USER: analyst
      POSTGRES_PASSWORD: change-me-in-production
      REDIS_URL: redis://localhost:6379
      RUN_DB_INTEGRATION: "1"
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit

      - name: Lint gateway
        run: npm run lint

      - name: Format check gateway
        run: npm run format:check

      - name: Test gateway
        run: npm test

      - name: Build gateway
        run: npm run build

  python-engine:
    name: Python engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/engine
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Lint engine
        run: python -m ruff check .

      - name: Format check engine
        run: python -m black --check .

      - name: Test engine
        run: python -m pytest
